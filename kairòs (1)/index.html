    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f8fafc;
        -webkit-tap-highlight-color: transparent;
        overflow: hidden; /* Prevent body scroll, handle in app */
        transition: background-color 0.3s ease, color 0.3s ease;
        overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
      }
      
      /* Dark Mode Global Overrides */
      html.dark body {
          background-color: #0f172a;
          color: #f8fafc;
      }

      /* Modern Animated Background */
      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-color: #F3F4F6;
        transition: opacity 0.5s ease;
      }

      html.dark .mesh-bg {
          background-color: #0f172a;
          opacity: 0.1; /* Dim the mesh in dark mode */
      }
      
      .mesh-bg {
        background-image: 
          radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        background-image: 
          radial-gradient(at 40% 20%, hsla(266,56%,96%,1) 0px, transparent 50%),
          radial-gradient(at 80% 0%, hsla(189,100%,96%,1) 0px, transparent 50%),
          radial-gradient(at 0% 50%, hsla(341,100%,96%,1) 0px, transparent 50%),
          radial-gradient(at 80% 50%, hsla(263,55%,96%,1) 0px, transparent 50%),
          radial-gradient(at 0% 100%, hsla(223,55%,96%,1) 0px, transparent 50%),
          radial-gradient(at 80% 100%, hsla(242,55%,96%,1) 0px, transparent 50%),
          radial-gradient(at 0% 0%, hsla(343,55%,96%,1) 0px, transparent 50%);
      }

      /* Polished Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.5); 
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(100, 116, 139, 0.8); 
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
